<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Familydog Admin 🐾</title>
<link rel="icon" href="https://raw.githubusercontent.com/Davidelfo86/dog-app/main/apple-touch-icon.png" type="image/png">
<meta name="theme-color" content="#e8a87c">
<style>
  :root{
    --cream:#fdf6ec; --cream-deep:#f7ecdc;
    --terracotta:#e8a87c; --terracotta-deep:#d98b5f;
    --sage:#a3b899; --sage-deep:#7d9673;
    --azzurro:#7ec4cf; --azzurro-deep:#5aa6b2;
    --brown:#6d574a; --brown-soft:#8a7263;
    --white:#fff; --danger:#d97a6c; --gold:#c8922f;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--cream);color:var(--brown);
       min-height:100vh;padding:16px;padding-bottom:70px;}
  h1,h2,h3{color:var(--brown);}
  .card{background:var(--white);border-radius:20px;padding:20px;margin:0 auto 16px;max-width:560px;
        box-shadow:0 6px 22px rgba(109,87,74,.10);}
  .hidden{display:none!important;}
  label{display:block;font-weight:600;margin:12px 0 6px;font-size:.95rem;}
  input,select{width:100%;padding:13px 14px;border:2px solid var(--cream-deep);border-radius:12px;
        font-size:1rem;background:var(--cream);color:var(--brown);}
  input:focus,select:focus{outline:none;border-color:var(--terracotta);}
  button{border:none;border-radius:14px;padding:14px 18px;font-size:1rem;font-weight:700;cursor:pointer;
        width:100%;margin-top:14px;transition:transform .08s ease,filter .15s ease;}
  button:active{transform:scale(.98);}
  .btn-primary{background:var(--terracotta);color:#fff;}
  .btn-primary:hover{filter:brightness(1.05);}
  .btn-sage{background:var(--sage-deep);color:#fff;}
  .btn-ghost{background:var(--cream-deep);color:var(--brown);}
  .btn-danger{background:var(--danger);color:#fff;}
  .brand{text-align:center;margin:6px 0 18px;}
  .brand .paw{font-size:2.4rem;}
  .brand h1{font-size:1.5rem;margin-top:4px;}
  .brand p{color:var(--brown-soft);font-size:.9rem;margin-top:2px;}
  .msg{padding:10px 12px;border-radius:10px;margin-top:10px;font-size:.9rem;text-align:center;}
  .msg.ok{background:#e7f1e2;color:var(--sage-deep);}
  .msg.err{background:#f7e3df;color:var(--danger);}
  /* Calendar */
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .cal-head button{width:auto;margin:0;padding:8px 14px;font-size:1.1rem;background:var(--cream-deep);color:var(--brown);}
  .cal-title{font-weight:800;font-size:1.05rem;text-transform:capitalize;}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .dl{text-align:center;font-weight:700;color:var(--brown-soft);font-size:.75rem;padding:4px 0;}
  .day{aspect-ratio:1;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;
       font-weight:700;cursor:pointer;background:var(--cream-deep);position:relative;font-size:.95rem;border:2px solid transparent;}
  .day.empty{background:transparent;cursor:default;}
  .day.occ{background:var(--terracotta);color:#fff;}
  .day.prova{background:var(--azzurro);color:#fff;}
  .day.incontro{background:var(--sage);color:#fff;}
  .day.past{opacity:.35;cursor:not-allowed;}
  .day.sel{border-color:var(--brown);}
  .day .nm{font-size:.5rem;line-height:1;margin-top:2px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px;}
  .legend{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:14px;font-size:.8rem;}
  .legend span{display:flex;align-items:center;gap:5px;}
  .dot{width:14px;height:14px;border-radius:5px;display:inline-block;}
  .who-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--cream);
       border-radius:10px;margin-top:8px;font-size:.9rem;}
  .who-item .badge{font-size:.7rem;padding:3px 8px;border-radius:20px;color:#fff;font-weight:700;}
  /* Soldi */
  .stay{background:var(--cream);border-radius:14px;padding:12px 14px;margin-top:10px;position:relative;}
  .stay .top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
  .stay .dog{font-weight:800;font-size:1rem;}
  .stay .earn{font-weight:800;color:var(--gold);font-size:1.05rem;white-space:nowrap;}
  .stay .sub{color:var(--brown-soft);font-size:.8rem;margin-top:3px;}
  .stay .del{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--danger);font-size:1.1rem;width:auto;margin:0;padding:2px 6px;cursor:pointer;}
  .totbar{display:flex;justify-content:space-between;align-items:center;background:var(--sage);color:#fff;
       border-radius:14px;padding:14px 16px;font-weight:800;font-size:1.1rem;margin-top:6px;}
  .month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .month-nav button{width:auto;margin:0;padding:6px 12px;background:var(--cream-deep);color:var(--brown);}
  .month-nav .lbl{font-weight:800;text-transform:capitalize;}
  .perdog{background:var(--cream);border-radius:12px;padding:10px 14px;margin-top:8px;display:flex;justify-content:space-between;font-size:.92rem;}
  .perdog b{color:var(--gold);}
  .tabbar{position:fixed;bottom:0;left:0;right:0;background:var(--white);display:flex;
       box-shadow:0 -4px 14px rgba(109,87,74,.10);}
  .tabbar button{margin:0;border-radius:0;background:var(--white);color:var(--brown-soft);padding:10px 2px;font-size:.72rem;line-height:1.25;}
  .tabbar button.active{color:var(--terracotta);}
  .modal-bg{position:fixed;inset:0;background:rgba(109,87,74,.45);display:none;align-items:flex-end;justify-content:center;z-index:50;}
  .modal-bg.open{display:flex;}
  .sheet{background:#fff;border-radius:22px 22px 0 0;padding:22px;width:100%;max-width:560px;animation:up .2s ease;max-height:92vh;overflow-y:auto;}
  @keyframes up{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .sel-date{text-align:center;font-weight:800;font-size:1.1rem;margin-bottom:4px;}
  .row2{display:flex;gap:10px;}
  .row2>div{flex:1;}
  .calc-preview{background:var(--cream);border-radius:12px;padding:12px;margin-top:12px;text-align:center;font-weight:700;}
  .calc-preview b{color:var(--gold);}
</style>
</head>
<body>

<!-- SAFETY NET (solo anteprima) -->
<script>
  window.addEventListener('error',function(e){try{e.preventDefault();}catch(_){}}, true);
  window.addEventListener('unhandledrejection',function(e){try{e.preventDefault();}catch(_){}});
</script>

<!-- ========== LOGIN ========== -->
<div id="loginScreen" class="card" style="margin-top:8vh;">
  <div class="brand"><div class="paw">🐾</div><h1>Familydog Admin</h1><p>Area riservata — gestione calendario e guadagni</p></div>
  <label for="pwd">Password</label>
  <input id="pwd" type="password" placeholder="Inserisci la password" autocomplete="current-password">
  <button class="btn-primary" id="loginBtn">Entra</button>
  <div id="loginMsg"></div>
</div>

<!-- ========== APP ========== -->
<div id="appScreen" class="hidden">

  <!-- TAB: CALENDARIO -->
  <div id="tabCal">
    <div class="card">
      <div class="cal-head">
        <button id="prevM">‹</button>
        <div class="cal-title" id="calTitle"></div>
        <button id="nextM">›</button>
      </div>
      <div class="grid" id="dowRow"></div>
      <div class="grid" id="calGrid" style="margin-top:6px;"></div>
      <div class="legend">
        <span><i class="dot" style="background:var(--terracotta)"></i>Occupato</span>
        <span><i class="dot" style="background:var(--sage)"></i>Primo incontro</span>
        <span><i class="dot" style="background:var(--azzurro)"></i>Giornata di prova</span>
        <span><i class="dot" style="background:var(--cream-deep)"></i>Libero</span>
      </div>
      <div id="calMsg"></div>
      <button class="btn-ghost" id="reloadBtn">🔄 Ricarica dal foglio</button>
    </div>
  </div>

  <!-- TAB: CHI C'È -->
  <div id="tabWho" class="hidden">
    <div class="card">
      <h2 style="text-align:center;margin-bottom:6px;">👀 Chi c'è</h2>
      <p style="text-align:center;color:var(--brown-soft);font-size:.85rem;">Prossime date occupate</p>
      <div id="whoList"></div>
    </div>
  </div>

  <!-- TAB: SOLDI / GUADAGNI -->
  <div id="tabMoney" class="hidden">
    <div class="card">
      <h2 style="text-align:center;margin-bottom:2px;">💰 Guadagni</h2>
      <p style="text-align:center;color:var(--brown-soft);font-size:.85rem;margin-bottom:8px;">Riepilogo per mese e per cane</p>

      <div class="month-nav">
        <button id="mPrev">‹</button>
        <div class="lbl" id="mLabel"></div>
        <button id="mNext">›</button>
      </div>

      <div class="totbar"><span>Totale mese</span><span id="monthTotal">€ 0</span></div>

      <h3 style="margin:16px 0 4px;font-size:1rem;">Per cane (questo mese)</h3>
      <div id="perDogList"></div>

      <h3 style="margin:18px 0 4px;font-size:1rem;">Soggiorni del mese</h3>
      <div id="stayList"></div>

      <button class="btn-primary" id="addStayBtn">➕ Aggiungi soggiorno</button>
    </div>
  </div>

  <!-- TABBAR -->
  <div class="tabbar">
    <button id="navCal" class="active">📅<br>Calendario</button>
    <button id="navWho">👀<br>Chi c'è</button>
    <button id="navMoney">💰<br>Guadagni</button>
    <button id="navOut">🚪<br>Esci</button>
  </div>
</div>

<!-- ========== BOTTOM SHEET: MODIFICA DATA CALENDARIO ========== -->
<div class="modal-bg" id="editSheet">
  <div class="sheet">
    <div class="sel-date" id="editDate">—</div>
    <label for="stato">Stato della data</label>
    <select id="stato">
      <option value="libero">🟢 Libero</option>
      <option value="occupato">🟠 Occupato</option>
      <option value="primo_incontro">🌿 Primo incontro</option>
      <option value="giornata_prova">💧 Giornata di prova</option>
    </select>
    <label for="nome" id="nomeLbl">Nome (cliente / cane)</label>
    <input id="nome" type="text" placeholder="Es. Rossi (Fido)">
    <button class="btn-primary" id="saveBtn">💾 Salva</button>
    <button class="btn-ghost" id="cancelBtn">Annulla</button>
    <div id="editMsg"></div>
  </div>
</div>

<!-- ========== BOTTOM SHEET: AGGIUNGI/MODIFICA SOGGIORNO ========== -->
<div class="modal-bg" id="staySheet">
  <div class="sheet">
    <div class="sel-date">🐕 Nuovo soggiorno</div>
    <label for="sDog">Nome del cane</label>
    <input id="sDog" type="text" placeholder="Es. Alaska">
    <div class="row2">
      <div>
        <label for="sIn">Arrivo</label>
        <input id="sIn" type="date">
      </div>
      <div>
        <label for="sOut">Partenza</label>
        <input id="sOut" type="date">
      </div>
    </div>
    <label for="sExit">Orario di uscita</label>
    <select id="sExit">
      <option value="mattina">Mattina (entro mezzogiorno)</option>
      <option value="pomeriggio">Pomeriggio / sera (+1 notte)</option>
    </select>
    <label for="sPrice">Prezzo a notte (€)</label>
    <input id="sPrice" type="number" inputmode="decimal" placeholder="Es. 20">
    <div class="calc-preview" id="calcPreview">Notti: — · Totale: <b>€ —</b></div>
    <button class="btn-primary" id="stateSaveBtn">💾 Salva soggiorno</button>
    <button class="btn-ghost" id="stayCancelBtn">Annulla</button>
    <div id="stayMsg"></div>
  </div>
</div>

<script>
/* ======================================================
   CONFIGURAZIONE — INCOLLA QUI IL LINK DEL DEPLOYMENT
   (quello che ottieni dal NUOVO Apps Script del calendario)
   ====================================================== */
var GAS_URL = "https://script.google.com/macros/s/AKfycbxUKRtDaMO6inTBmy-RGhPxbDQQ2FMer3055CMa_ydZeRBCdyk15ztf7i0s0uUiRKXBfw/exec";

/* ---------- Stato in memoria ---------- */
var records = {};              // calendario: { "8/7/2026": {stato, prenotatoDa, primoIncontro, giornataProva} }
var view = new Date();         // mese calendario
var selectedDate = null;
var ADMIN_PWD=[REDACTED_PASSWORD]

/* ---------- SOLDI ---------- */
var stays = [];                // [{id, dog, dateIn:"yyyy-mm-dd", dateOut:"yyyy-mm-dd", exit:"mattina|pomeriggio", price:Number, nights:Number, total:Number}]
var moneyView = new Date();    // mese guadagni
var STORAGE_KEY = "familydog_stays_v1";

/* ---------- Utility ---------- */
function $(id){ return document.getElementById(id); }
function key(y,m,d){ return d+"/"+(m+1)+"/"+y; }
function showMsg(el,txt,type){ if(!el)return; el.className="msg "+(type||""); el.textContent=txt; }
function clearMsg(el){ if(el){ el.textContent=""; el.className=""; } }
function euro(n){ return "€ " + (Math.round(n*100)/100).toString().replace(".",","); }

var MESI=["gennaio","febbraio","marzo","aprile","maggio","giugno","luglio","agosto","settembre","ottobre","novembre","dicembre"];
var DOW=["Lu","Ma","Me","Gi","Ve","Sa","Do"];

/* ---------- LOGIN ---------- */
function doLogin(){
  var pwd=[REDACTED_PASSWORD]
  if(!pwd){ showMsg($("loginMsg"),"Inserisci la password.","err"); return; }
  ADMIN_PWD=[REDACTED_PASSWORD]
  $("loginScreen").classList.add("hidden");
  $("appScreen").classList.remove("hidden");
  loadStays();
  loadData();
  renderMoney();
}

/* ================= CALENDARIO ================= */
function loadData(){
  clearMsg($("calMsg"));
  showMsg($("calMsg"),"Carico il calendario…","");
  fetch(GAS_URL + "?action=list&t=" + Date.now())
    .then(function(r){ return r.json(); })
    .then(function(res){
      records = {};
      if(res && res.ok && res.rows){ res.rows.forEach(function(row){ records[row.data]=row; }); }
      clearMsg($("calMsg")); renderCal(); renderWho();
    })
    .catch(function(){
      showMsg($("calMsg"),"⚠️ Non riesco a leggere il foglio. Controlla il link o la connessione.","err");
      renderCal();
    });
}
function statoDi(rec){
  if(!rec) return "libero";
  if(rec.giornataProva) return "giornata_prova";
  if(rec.primoIncontro) return "primo_incontro";
  if(rec.stato && rec.stato.toString().trim()!=="") return "occupato";
  return "libero";
}
function nomeDi(rec){ if(!rec) return ""; return rec.giornataProva || rec.primoIncontro || rec.prenotatoDa || ""; }

function renderCal(){
  var dow=$("dowRow"); if(dow){ dow.innerHTML=""; DOW.forEach(function(d){ var e=document.createElement("div"); e.className="dl"; e.textContent=d; dow.appendChild(e); }); }
  var grid=$("calGrid"); if(!grid) return; grid.innerHTML="";
  var title=$("calTitle"); if(title) title.textContent = MESI[view.getMonth()]+" "+view.getFullYear();
  var y=view.getFullYear(), m=view.getMonth();
  var first=new Date(y,m,1).getDay(); var offset=(first===0)?6:first-1;
  var days=new Date(y,m+1,0).getDate();
  for(var i=0;i<offset;i++){ var e=document.createElement("div"); e.className="day empty"; grid.appendChild(e); }
  var today=new Date(); today.setHours(0,0,0,0);
  for(var d=1;d<=days;d++){
    var k=key(y,m,d); var rec=records[k]; var st=statoDi(rec);
    var cell=document.createElement("div"); cell.className="day";
    if(st==="occupato") cell.className+=" occ";
    else if(st==="primo_incontro") cell.className+=" incontro";
    else if(st==="giornata_prova") cell.className+=" prova";
    var thisDate=new Date(y,m,d); thisDate.setHours(0,0,0,0);
    var isPast=thisDate<today; if(isPast) cell.className+=" past";
    if(selectedDate===k) cell.className+=" sel";
    var num=document.createElement("div"); num.textContent=d; cell.appendChild(num);
    var nm=nomeDi(rec); if(nm){ var nmE=document.createElement("div"); nmE.className="nm"; nmE.textContent=nm; cell.appendChild(nmE); }
    (function(kk,past){ cell.addEventListener("click",function(){ if(past) return; openEdit(kk); }); })(k,isPast);
    grid.appendChild(cell);
  }
}
function renderWho(){
  var box=$("whoList"); if(!box) return; box.innerHTML="";
  var today=new Date(); today.setHours(0,0,0,0); var items=[];
  Object.keys(records).forEach(function(k){
    var rec=records[k]; var st=statoDi(rec); if(st==="libero") return;
    var p=k.split("/"); var dt=new Date(+p[2],+p[1]-1,+p[0]); dt.setHours(0,0,0,0);
    if(dt<today) return; items.push({k:k,dt:dt,st:st,nome:nomeDi(rec)});
  });
  items.sort(function(a,b){ return a.dt-b.dt; });
  if(items.length===0){ box.innerHTML='<p style="text-align:center;color:var(--brown-soft);margin-top:14px;">Nessuna prenotazione futura 🐾</p>'; return; }
  items.forEach(function(it){
    var color=it.st==="occupato"?"var(--terracotta)":it.st==="primo_incontro"?"var(--sage)":"var(--azzurro)";
    var lbl=it.st==="occupato"?"Occupato":it.st==="primo_incontro"?"Primo incontro":"Giornata di prova";
    var row=document.createElement("div"); row.className="who-item";
    row.innerHTML='<span><b>'+it.k+'</b>'+(it.nome?' — '+it.nome:'')+'</span><span class="badge" style="background:'+color+'">'+lbl+'</span>';
    box.appendChild(row);
  });
}
function openEdit(k){
  selectedDate=k; var rec=records[k];
  $("editDate").textContent="📅 "+k;
  $("stato").value=statoDi(rec); $("nome").value=nomeDi(rec);
  toggleNome(); clearMsg($("editMsg")); $("editSheet").classList.add("open"); renderCal();
}
function closeEdit(){ $("editSheet").classList.remove("open"); selectedDate=null; renderCal(); }
function toggleNome(){
  var st=$("stato").value;
  $("nomeLbl").style.display=(st==="libero")?"none":"block";
  $("nome").style.display=(st==="libero")?"none":"block";
}
function saveDate(){
  if(!selectedDate) return;
  var stato=$("stato").value, nome=$("nome").value.trim();
  showMsg($("editMsg"),"Salvo…","");
  var payload={ password=[REDACTED_PASSWORD] data:selectedDate, stato:stato, nome:nome };
  fetch(GAS_URL,{ method:"POST", body:JSON.stringify(payload) })
    .then(function(r){ return r.json(); })
    .then(function(res){
      if(res && res.ok){
        if(stato==="libero"){ delete records[selectedDate]; }
        else{ records[selectedDate]={ data:selectedDate, stato:"1",
          prenotatoDa: stato==="occupato"?nome:"", primoIncontro: stato==="primo_incontro"?nome:"", giornataProva: stato==="giornata_prova"?nome:"" }; }
        showMsg($("editMsg"),"✅ Salvato!","ok"); renderCal(); renderWho(); setTimeout(closeEdit,700);
      } else { showMsg($("editMsg"),"❌ "+((res&&res.error)||"Errore nel salvataggio"),"err"); }
    })
    .catch(function(){ showMsg($("editMsg"),"⚠️ Errore di connessione. Riprova.","err"); });
}

/* ================= SOLDI / GUADAGNI ================= */
function loadStays(){
  try{ var raw=localStorage.getItem(STORAGE_KEY); stays = raw ? JSON.parse(raw) : []; }
  catch(e){ stays=[]; }
}
function saveStays(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(stays)); }catch(e){}
}
/* Calcolo notti secondo la regola di Davide:
   - notti base = giorni tra arrivo e partenza
   - se stesso giorno => 1
   - se uscita "pomeriggio" => +1 */
function calcNights(dateIn, dateOut, exit){
  if(!dateIn || !dateOut) return 0;
  var a=new Date(dateIn+"T00:00:00"), b=new Date(dateOut+"T00:00:00");
  if(isNaN(a) || isNaN(b)) return 0;
  var diff=Math.round((b-a)/86400000);
  if(diff<0) return 0;
  if(diff===0) return 1;              // arrivo e partenza stesso giorno = 1 notte
  var nights=diff;                    // notti effettive
  if(exit==="pomeriggio") nights+=1;  // esce nel pomeriggio/sera = +1
  return nights;
}
function updateCalcPreview(){
  var n=calcNights($("sIn").value, $("sOut").value, $("sExit").value);
  var price=parseFloat($("sPrice").value)||0;
  var tot=n*price;
  $("calcPreview").innerHTML="Notti: "+ (n||"—") +" · Totale: <b>"+ (tot? euro(tot):"€ —") +"</b>";
}
function openStay(){
  $("sDog").value=""; $("sIn").value=""; $("sOut").value=""; $("sExit").value="mattina"; $("sPrice").value="";
  updateCalcPreview(); clearMsg($("stayMsg")); $("staySheet").classList.add("open");
}
function closeStay(){ $("staySheet").classList.remove("open"); }
function saveStay(){
  var dog=$("sDog").value.trim();
  var dIn=$("sIn").value, dOut=$("sOut").value, exit=$("sExit").value;
  var price=parseFloat($("sPrice").value)||0;
  if(!dog){ showMsg($("stayMsg"),"Scrivi il nome del cane.","err"); return; }
  if(!dIn || !dOut){ showMsg($("stayMsg"),"Inserisci arrivo e partenza.","err"); return; }
  var nights=calcNights(dIn,dOut,exit);
  if(nights<=0){ showMsg($("stayMsg"),"La partenza deve essere uguale o dopo l'arrivo.","err"); return; }
  if(price<=0){ showMsg($("stayMsg"),"Inserisci un prezzo a notte.","err"); return; }
  var total=nights*price;
  stays.push({ id:Date.now(), dog:dog, dateIn:dIn, dateOut:dOut, exit:exit, price:price, nights:nights, total:total });
  saveStays();
  showMsg($("stayMsg"),"✅ Soggiorno salvato!","ok");
  renderMoney();
  setTimeout(closeStay,700);
}
function deleteStay(id){
  if(!confirm("Eliminare questo soggiorno?")) return;
  stays=stays.filter(function(s){ return s.id!==id; });
  saveStays(); renderMoney();
}
/* Un soggiorno appartiene al mese della data di ARRIVO */
function stayInMonth(s, y, m){
  var a=new Date(s.dateIn+"T00:00:00");
  return a.getFullYear()===y && a.getMonth()===m;
}
function renderMoney(){
  var y=moneyView.getFullYear(), m=moneyView.getMonth();
  var lbl=$("mLabel"); if(lbl) lbl.textContent=MESI[m]+" "+y;

  var monthStays=stays.filter(function(s){ return stayInMonth(s,y,m); });
  monthStays.sort(function(a,b){ return new Date(a.dateIn)-new Date(b.dateIn); });

  // Totale mese
  var tot=0; monthStays.forEach(function(s){ tot+=s.total; });
  var mt=$("monthTotal"); if(mt) mt.textContent=euro(tot);

  // Per cane
  var perDog={}; monthStays.forEach(function(s){ perDog[s.dog]=(perDog[s.dog]||0)+s.total; });
  var pd=$("perDogList"); if(pd){ pd.innerHTML="";
    var dogs=Object.keys(perDog);
    if(dogs.length===0){ pd.innerHTML='<p style="color:var(--brown-soft);font-size:.88rem;margin-top:6px;">Nessun soggiorno questo mese.</p>'; }
    dogs.forEach(function(dog){
      var el=document.createElement("div"); el.className="perdog";
      el.innerHTML='<span>🐕 '+dog+'</span><b>'+euro(perDog[dog])+'</b>'; pd.appendChild(el);
    });
  }

  // Lista soggiorni
  var sl=$("stayList"); if(sl){ sl.innerHTML="";
    if(monthStays.length===0){ sl.innerHTML='<p style="color:var(--brown-soft);font-size:.88rem;margin-top:6px;">Aggiungi il primo soggiorno con il pulsante qui sotto. 🐾</p>'; }
    monthStays.forEach(function(s){
      var el=document.createElement("div"); el.className="stay";
      var inStr=fmtDate(s.dateIn), outStr=fmtDate(s.dateOut);
      var exitTxt=s.exit==="pomeriggio"?"uscita pomeriggio":"uscita mattina";
      el.innerHTML=
        '<div class="top"><span class="dog">🐕 '+s.dog+'</span><span class="earn">'+euro(s.total)+'</span></div>'+
        '<div class="sub">'+inStr+' → '+outStr+' · '+s.nights+' notti × '+euro(s.price)+' · '+exitTxt+'</div>'+
        '<button class="del" data-id="'+s.id+'">🗑️</button>';
      sl.appendChild(el);
    });
    // bind delete
    var dels=sl.querySelectorAll(".del");
    for(var i=0;i<dels.length;i++){
      (function(btn){ btn.addEventListener("click",function(){ deleteStay(parseInt(btn.getAttribute("data-id"))); }); })(dels[i]);
    }
  }
}
function fmtDate(iso){
  if(!iso) return "";
  var p=iso.split("-"); return p[2]+"/"+p[1]+"/"+p[0];
}

/* ================= NAVIGAZIONE TAB ================= */
function showTab(which){
  $("tabCal").classList.toggle("hidden", which!=="cal");
  $("tabWho").classList.toggle("hidden", which!=="who");
  $("tabMoney").classList.toggle("hidden", which!=="money");
  $("navCal").classList.toggle("active", which==="cal");
  $("navWho").classList.toggle("active", which==="who");
  $("navMoney").classList.toggle("active", which==="money");
  if(which==="who") renderWho();
  if(which==="money") renderMoney();
}

/* ================= BINDING ================= */
window.onload=function(){
  if($("loginBtn")) $("loginBtn").onclick=doLogin;
  if($("pwd")) $("pwd").addEventListener("keydown",function(e){ if(e.key==="Enter") doLogin(); });
  // calendario
  if($("prevM")) $("prevM").onclick=function(){ view.setMonth(view.getMonth()-1); renderCal(); };
  if($("nextM")) $("nextM").onclick=function(){ view.setMonth(view.getMonth()+1); renderCal(); };
  if($("reloadBtn")) $("reloadBtn").onclick=loadData;
  if($("stato")) $("stato").onchange=toggleNome;
  if($("saveBtn")) $("saveBtn").onclick=saveDate;
  if($("cancelBtn")) $("cancelBtn").onclick=closeEdit;
  if($("editSheet")) $("editSheet").addEventListener("click",function(e){ if(e.target===$("editSheet")) closeEdit(); });
  // soldi
  if($("mPrev")) $("mPrev").onclick=function(){ moneyView.setMonth(moneyView.getMonth()-1); renderMoney(); };
  if($("mNext")) $("mNext").onclick=function(){ moneyView.setMonth(moneyView.getMonth()+1); renderMoney(); };
  if($("addStayBtn")) $("addStayBtn").onclick=openStay;
  if($("stateSaveBtn")) $("stateSaveBtn").onclick=saveStay;
  if($("stayCancelBtn")) $("stayCancelBtn").onclick=closeStay;
  if($("sIn")) $("sIn").onchange=updateCalcPreview;
  if($("sOut")) $("sOut").onchange=updateCalcPreview;
  if($("sExit")) $("sExit").onchange=updateCalcPreview;
  if($("sPrice")) $("sPrice").oninput=updateCalcPreview;
  if($("staySheet")) $("staySheet").addEventListener("click",function(e){ if(e.target===$("staySheet")) closeStay(); });
  // tabs
  if($("navCal")) $("navCal").onclick=function(){ showTab("cal"); };
  if($("navWho")) $("navWho").onclick=function(){ showTab("who"); };
  if($("navMoney")) $("navMoney").onclick=function(){ showTab("money"); };
  if($("navOut")) $("navOut").onclick=function(){ location.reload(); };
};
</script>


</body></html>
